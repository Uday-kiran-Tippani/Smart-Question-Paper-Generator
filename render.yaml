services:
  - type: web
    name: ml-question-generator-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ML_SERVER_URL
        fromService:
          type: web
          name: ml-question-generator-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        fromDatabase:
          name: question-generator-db
          property: connectionString

  - type: web
    name: ml-question-generator-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ml_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12

databases:
  - name: question-generator-db
    databaseName: qg_db
    user: qg_user
    plan: free
